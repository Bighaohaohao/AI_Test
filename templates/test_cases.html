<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试用例管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075); }
        .table th { font-weight: 600; }
        .priority-P0 { background-color: #dc3545; color: white; }
        .priority-P1 { background-color: #ffc107; color: black; }
        .priority-P2 { background-color: #28a745; color: white; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h4 class="mb-0"><i class="fas fa-database me-2"></i>测试用例管理</h4>
                        <div>
                            <a href="/" class="btn btn-light btn-sm me-2">
                                <i class="fas fa-magic me-1"></i>生成用例
                            </a>
                            <a href="/modules.html" class="btn btn-light btn-sm me-2">
                                <i class="fas fa-cubes me-1"></i>功能模块
                            </a>
                            <a href="/api_config.html" class="btn btn-light btn-sm">
                                <i class="fas fa-key me-1"></i>API密钥
                            </a>
                        </div>
                    </div>
                    <div class="card-body">
                        <!-- 筛选区域 -->
                        <div class="row mb-3">
                            <div class="col-md-2">
                                <select id="filterModule" class="form-select">
                                    <option value="">所有模块</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <select id="filterRequirement" class="form-select">
                                    <option value="">所有需求</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <select id="filterType" class="form-select">
                                    <option value="">所有类型</option>
                                    <option value="功能测试">功能测试</option>
                                    <option value="接口测试">接口测试</option>
                                    <option value="性能测试">性能测试</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <select id="filterPriority" class="form-select">
                                    <option value="">所有优先级</option>
                                    <option value="P0">P0</option>
                                    <option value="P1">P1</option>
                                    <option value="P2">P2</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <select id="filterStatus" class="form-select">
                                    <option value="">所有状态</option>
                                    <option value="draft">草稿</option>
                                    <option value="approved">已审核</option>
                                    <option value="deprecated">已废弃</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <button id="searchBtn" class="btn btn-primary">
                                    <i class="fas fa-search me-1"></i>搜索
                                </button>
                                <button id="resetBtn" class="btn btn-secondary">
                                    <i class="fas fa-undo me-1"></i>重置
                                </button>
                            </div>
                        </div>
                        
                        <!-- 统计信息 -->
                        <div class="alert alert-info">
                            共 <strong id="totalCount">0</strong> 条测试用例
                        </div>
                        
                        <!-- 用例列表 -->
                        <div class="table-responsive">
                            <table class="table table-hover table-sm" style="font-size: 0.85rem;">
                                <thead class="table-light">
                                    <tr>
                                        <th style="width: 80px;">编号</th>
                                        <th style="width: 100px;">模块</th>
                                        <th style="width: 150px;">用例名称</th>
                                        <th>操作步骤</th>
                                        <th>预期结果</th>
                                        <th style="width: 80px;">类型</th>
                                        <th style="width: 60px;">优先级</th>
                                        <th style="width: 80px;">状态</th>
                                        <th style="width: 60px;">修订</th>
                                        <th style="width: 100px;">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="caseTableBody">
                                </tbody>
                            </table>
                        </div>
                        
                        <!-- 分页 -->
                        <nav aria-label="Page navigation">
                            <ul class="pagination justify-content-center" id="pagination">
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 编辑模态框 -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content" style="font-size: 0.9rem;">
                <div class="modal-header">
                    <h5 class="modal-title" style="font-size: 1rem;">编辑测试用例</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editCaseId">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">用例编号</label>
                            <input type="text" class="form-control" id="editCaseNo" readonly>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">模块（只读）</label>
                            <input type="text" class="form-control" id="editModule" readonly>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">关联需求（只读）</label>
                        <textarea class="form-control" id="editRequirement" rows="2" readonly></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">用例名称</label>
                        <input type="text" class="form-control" id="editCaseName">
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">测试类型</label>
                            <select class="form-select" id="editCaseType">
                                <option value="功能测试">功能测试</option>
                                <option value="接口测试">接口测试</option>
                                <option value="性能测试">性能测试</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">优先级</label>
                            <select class="form-select" id="editPriority">
                                <option value="P0">P0</option>
                                <option value="P1">P1</option>
                                <option value="P2">P2</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">状态</label>
                            <select class="form-select" id="editStatus">
                                <option value="draft">草稿</option>
                                <option value="approved">已审核</option>
                                <option value="deprecated">已废弃</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">前置条件</label>
                        <textarea class="form-control" id="editPrecondition" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">测试步骤</label>
                        <textarea class="form-control" id="editSteps" rows="4"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">预期结果</label>
                        <textarea class="form-control" id="editExpected" rows="3"></textarea>
                    </div>
                    <div class="mb-3" id="editInfoSection" style="display: none;">
                        <label class="form-label">修订内容</label>
                        <div id="editComparison" style="font-size: 0.8rem;">
                            <!-- 修订对比内容将在这里动态生成 -->
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="saveEditBtn">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentPage = 0;
        const pageSize = 10;
        let totalCases = 0;
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadModules();
            loadRequirements();
            loadTestCases();
            
            // 绑定搜索按钮
            document.getElementById('searchBtn').addEventListener('click', () => {
                currentPage = 0;
                loadTestCases();
            });
            
            // 绑定重置按钮
            document.getElementById('resetBtn').addEventListener('click', () => {
                document.getElementById('filterModule').value = '';
                document.getElementById('filterRequirement').value = '';
                document.getElementById('filterType').value = '';
                document.getElementById('filterPriority').value = '';
                document.getElementById('filterStatus').value = '';
                currentPage = 0;
                loadTestCases();
            });
            
            // 绑定保存编辑按钮
            document.getElementById('saveEditBtn').addEventListener('click', saveEditedCase);
        });
        
        // 加载模块列表
        async function loadModules() {
            try {
                const response = await fetch('http://localhost:8000/api/modules');
                const result = await response.json();
                const modules = result.items || [];  // 后端返回 {items: [...]} 格式
                
                const select = document.getElementById('filterModule');
                // 保留第一个选项（所有模块）
                select.innerHTML = '<option value="">所有模块</option>';
                
                modules.forEach(m => {
                    const option = document.createElement('option');
                    option.value = m.name;  // 使用模块名称作为值
                    option.textContent = m.name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('加载模块列表失败:', error);
            }
        }
        
        // 加载需求列表
        async function loadRequirements() {
            try {
                const response = await fetch('http://localhost:8000/api/requirements');
                const result = await response.json();
                const requirements = result.items || [];  // 后端返回 {items: [...]} 格式
                
                const select = document.getElementById('filterRequirement');
                // 保留第一个选项（所有需求）
                select.innerHTML = '<option value="">所有需求</option>';
                
                requirements.forEach(r => {
                    const option = document.createElement('option');
                    // 截断过长的需求内容
                    const shortContent = r.content.length > 30 ? r.content.substring(0, 30) + '...' : r.content;
                    option.value = r.content;  // 使用完整内容作为值用于筛选
                    option.textContent = shortContent;
                    option.title = r.content;  // 鼠标悬停显示完整内容
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('加载需求列表失败:', error);
            }
        }
        
        // 加载测试用例列表
        async function loadTestCases() {
            try {
                const params = new URLSearchParams({
                    skip: currentPage * pageSize,
                    limit: pageSize
                });
                
                const module = document.getElementById('filterModule').value;
                const requirement = document.getElementById('filterRequirement').value;
                const caseType = document.getElementById('filterType').value;
                const priority = document.getElementById('filterPriority').value;
                const status = document.getElementById('filterStatus').value;
                
                if (module) params.append('module', module);
                if (requirement) params.append('requirement', requirement);
                if (caseType) params.append('case_type', caseType);
                if (priority) params.append('priority', priority);
                if (status) params.append('status', status);
                
                const response = await fetch(`http://localhost:8000/api/test-cases?${params}`);
                const data = await response.json();
                
                totalCases = data.total;
                document.getElementById('totalCount').textContent = totalCases;
                
                renderTable(data.items);
                renderPagination();
            } catch (error) {
                console.error('加载测试用例失败:', error);
                alert('加载失败：' + error.message);
            }
        }
        
        // 渲染表格
        function renderTable(cases) {
            const tbody = document.getElementById('caseTableBody');
            tbody.innerHTML = '';
            
            if (cases.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">暂无数据</td></tr>';
                return;
            }
            
            cases.forEach(c => {
                const row = tbody.insertRow();
                const steps = c.steps ? c.steps.substring(0, 100) + (c.steps.length > 100 ? '...' : '') : '-';
                const expected = c.expected_result ? c.expected_result.substring(0, 100) + (c.expected_result.length > 100 ? '...' : '') : '-';
                const editedBadge = c.is_edited === 'true' 
                    ? '<span class="badge bg-warning" title="' + (c.edit_reason || '人工修订') + '">已修订</span>' 
                    : '<span class="badge bg-light text-dark">AI生成</span>';
                row.innerHTML = `
                    <td>${c.case_id}</td>
                    <td><span class="badge bg-secondary">${c.module_name || '-'}</span></td>
                    <td>${c.case_name}</td>
                    <td style="max-width: 200px; white-space: pre-wrap;">${steps}</td>
                    <td style="max-width: 200px; white-space: pre-wrap;">${expected}</td>
                    <td><span class="badge bg-info">${c.case_type}</span></td>
                    <td><span class="badge priority-${c.priority}">${c.priority}</span></td>
                    <td>${getStatusBadge(c.status)}</td>
                    <td>${editedBadge}</td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="editCase('${c.id}')">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteCase('${c.id}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
            });
        }
        
        // 获取状态标签
        function getStatusBadge(status) {
            const map = {
                'draft': '<span class="badge bg-warning">草稿</span>',
                'approved': '<span class="badge bg-success">已审核</span>',
                'deprecated': '<span class="badge bg-secondary">已废弃</span>'
            };
            return map[status] || status;
        }
        
        // 渲染分页
        function renderPagination() {
            const totalPages = Math.ceil(totalCases / pageSize);
            const ul = document.getElementById('pagination');
            ul.innerHTML = '';
            
            // 上一页
            ul.innerHTML += `
                <li class="page-item ${currentPage === 0 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="changePage(${currentPage - 1})">上一页</a>
                </li>
            `;
            
            // 页码
            for (let i = 0; i < totalPages; i++) {
                ul.innerHTML += `
                    <li class="page-item ${i === currentPage ? 'active' : ''}">
                        <a class="page-link" href="#" onclick="changePage(${i})">${i + 1}</a>
                    </li>
                `;
            }
            
            // 下一页
            ul.innerHTML += `
                <li class="page-item ${currentPage >= totalPages - 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="changePage(${currentPage + 1})">下一页</a>
                </li>
            `;
        }
        
        // 切换页面
        function changePage(page) {
            const totalPages = Math.ceil(totalCases / pageSize);
            if (page < 0 || page >= totalPages) return;
            currentPage = page;
            loadTestCases();
        }
        
        // 编辑用例
        async function editCase(id) {
            try {
                const response = await fetch(`http://localhost:8000/api/test-cases/${id}`);
                const c = await response.json();
                
                document.getElementById('editCaseId').value = c.id;
                document.getElementById('editCaseNo').value = c.case_id;
                document.getElementById('editModule').value = c.module_name || '';
                document.getElementById('editRequirement').value = c.requirement_content || '';
                document.getElementById('editCaseName').value = c.case_name;
                document.getElementById('editCaseType').value = c.case_type;
                document.getElementById('editPriority').value = c.priority;
                document.getElementById('editStatus').value = c.status;
                document.getElementById('editPrecondition').value = c.precondition || '';
                document.getElementById('editSteps').value = c.steps || '';
                document.getElementById('editExpected').value = c.expected_result || '';
                
                // 显示修订内容对比
                const editInfoSection = document.getElementById('editInfoSection');
                const editComparison = document.getElementById('editComparison');
                if (c.is_edited === 'true') {
                    editInfoSection.style.display = 'block';
                    let comparisonHtml = '<div class="alert alert-warning py-2 mb-2"><strong>已人工修订</strong></div>';
                    
                    // 解析原始值
                    let originalValues = {};
                    try {
                        originalValues = c.original_values ? JSON.parse(c.original_values) : {};
                    } catch (e) {
                        originalValues = {};
                    }
                    
                    // 解析修订字段
                    let editedFields = [];
                    try {
                        editedFields = c.edited_fields ? JSON.parse(c.edited_fields) : [];
                    } catch (e) {
                        editedFields = [];
                    }
                    
                    // 字段名称映射
                    const fieldNames = {
                        'case_name': '用例名称',
                        'precondition': '前置条件',
                        'steps': '测试步骤',
                        'expected_result': '预期结果',
                        'priority': '优先级',
                        'case_type': '测试类型'
                    };
                    
                    // 当前值映射
                    const currentValues = {
                        'case_name': c.case_name,
                        'precondition': c.precondition,
                        'steps': c.steps,
                        'expected_result': c.expected_result,
                        'priority': c.priority,
                        'case_type': c.case_type
                    };
                    
                    // 生成对比表格
                    editedFields.forEach(field => {
                        const fieldName = fieldNames[field] || field;
                        const original = originalValues[field] || '(空)';
                        const current = currentValues[field] || '(空)';
                        
                        comparisonHtml += `
                            <div class="card mb-2 border-warning">
                                <div class="card-header py-1 bg-warning bg-opacity-25">
                                    <strong>${fieldName}</strong>
                                </div>
                                <div class="card-body py-2">
                                    <div class="row">
                                        <div class="col-6">
                                            <small class="text-muted">修订前:</small>
                                            <div class="text-decoration-line-through text-muted" style="white-space: pre-wrap;">${original}</div>
                                        </div>
                                        <div class="col-6">
                                            <small class="text-success">修订后:</small>
                                            <div class="text-success" style="white-space: pre-wrap;">${current}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    
                    editComparison.innerHTML = comparisonHtml;
                } else {
                    editInfoSection.style.display = 'none';
                }
                
                const modal = new bootstrap.Modal(document.getElementById('editModal'));
                modal.show();
            } catch (error) {
                alert('加载用例详情失败：' + error.message);
            }
        }
        
        // 保存编辑
        async function saveEditedCase() {
            const id = document.getElementById('editCaseId').value;
            
            const formData = new FormData();
            formData.append('case_name', document.getElementById('editCaseName').value);
            formData.append('precondition', document.getElementById('editPrecondition').value);
            formData.append('steps', document.getElementById('editSteps').value);
            formData.append('expected_result', document.getElementById('editExpected').value);
            formData.append('priority', document.getElementById('editPriority').value);
            formData.append('case_type', document.getElementById('editCaseType').value);
            formData.append('status', document.getElementById('editStatus').value);
            formData.append('is_edited', 'true');
            formData.append('edit_reason', '人工修订');
            
            try {
                const response = await fetch(`http://localhost:8000/api/test-cases/${id}`, {
                    method: 'PUT',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                    loadTestCases();
                    alert('保存成功');
                } else {
                    alert('保存失败：' + result.error);
                }
            } catch (error) {
                alert('保存失败：' + error.message);
            }
        }
        
        // 删除用例
        async function deleteCase(id) {
            if (!confirm('确定要删除这条测试用例吗？')) {
                return;
            }
            
            try {
                const response = await fetch(`http://localhost:8000/api/test-cases/${id}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    loadTestCases();
                    alert('删除成功');
                } else {
                    alert('删除失败：' + result.error);
                }
            } catch (error) {
                alert('删除失败：' + error.message);
            }
        }
    </script>
</body>
</html>
