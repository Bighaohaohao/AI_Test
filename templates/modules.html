<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>功能模块管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075); }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h4 class="mb-0"><i class="fas fa-cubes me-2"></i>功能模块管理</h4>
                        <div>
                            <a href="/" class="btn btn-light btn-sm me-2">
                                <i class="fas fa-magic me-1"></i>生成用例
                            </a>
                            <a href="/test_cases.html" class="btn btn-light btn-sm me-2">
                                <i class="fas fa-database me-1"></i>用例管理
                            </a>
                            <a href="/api_config.html" class="btn btn-light btn-sm">
                                <i class="fas fa-key me-1"></i>API密钥
                            </a>
                        </div>
                    </div>
                    <div class="card-body">
                        <!-- 添加模块表单 -->
                        <div class="card mb-4">
                            <div class="card-header">
                                <i class="fas fa-plus me-1"></i>添加新模块
                            </div>
                            <div class="card-body">
                                <form id="addModuleForm">
                                    <div class="row">
                                        <div class="col-md-4">
                                            <label class="form-label">模块名称 <span class="text-danger">*</span></label>
                                            <input type="text" class="form-control" id="moduleName" required placeholder="例如：钱包管理">
                                        </div>
                                        <div class="col-md-5">
                                            <label class="form-label">模块描述</label>
                                            <input type="text" class="form-control" id="moduleDesc" placeholder="简要描述模块功能">
                                        </div>
                                        <div class="col-md-2">
                                            <label class="form-label">排序</label>
                                            <input type="number" class="form-control" id="moduleSort" value="0" min="0">
                                        </div>
                                        <div class="col-md-1 d-flex align-items-end">
                                            <button type="submit" class="btn btn-primary w-100">
                                                <i class="fas fa-plus"></i>
                                            </button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                        
                        <!-- 模块列表 -->
                        <h5 class="mb-3"><i class="fas fa-list me-1"></i>模块列表</h5>
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead class="table-light">
                                    <tr>
                                        <th style="width: 80px;">排序</th>
                                        <th>模块名称</th>
                                        <th>描述</th>
                                        <th>状态</th>
                                        <th>创建时间</th>
                                        <th style="width: 150px;">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="moduleTableBody">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 编辑模态框 -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">编辑功能模块</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editModuleId">
                    <div class="mb-3">
                        <label class="form-label">模块名称 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="editName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">模块描述</label>
                        <input type="text" class="form-control" id="editDesc">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">排序</label>
                        <input type="number" class="form-control" id="editSort" min="0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">状态</label>
                        <select class="form-select" id="editStatus">
                            <option value="true">启用</option>
                            <option value="false">禁用</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="saveEditBtn">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadModules();
            
            // 绑定添加表单
            document.getElementById('addModuleForm').addEventListener('submit', addModule);
            
            // 绑定保存编辑按钮
            document.getElementById('saveEditBtn').addEventListener('click', saveEditedModule);
        });
        
        // 加载模块列表
        async function loadModules() {
            try {
                const response = await fetch('http://localhost:8000/api/modules?is_active=all');
                const data = await response.json();
                
                renderTable(data.items);
            } catch (error) {
                console.error('加载模块失败:', error);
                alert('加载失败：' + error.message);
            }
        }
        
        // 渲染表格
        function renderTable(modules) {
            const tbody = document.getElementById('moduleTableBody');
            tbody.innerHTML = '';
            
            if (modules.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">暂无模块，请添加</td></tr>';
                return;
            }
            
            modules.forEach(m => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${m.sort_order}</td>
                    <td><strong>${m.name}</strong></td>
                    <td>${m.description || '-'}</td>
                    <td>${m.is_active === 'true' ? '<span class="badge bg-success">启用</span>' : '<span class="badge bg-secondary">禁用</span>'}</td>
                    <td>${new Date(m.created_at).toLocaleDateString()}</td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="editModule('${m.id}', '${escapeHtml(m.name)}', '${escapeHtml(m.description || '')}', ${m.sort_order}, '${m.is_active}')">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteModule('${m.id}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
            });
        }
        
        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }
        
        // 添加模块
        async function addModule(e) {
            e.preventDefault();
            
            const name = document.getElementById('moduleName').value.trim();
            const description = document.getElementById('moduleDesc').value.trim();
            const sortOrder = document.getElementById('moduleSort').value;
            
            if (!name) {
                alert('请输入模块名称');
                return;
            }
            
            try {
                const formData = new FormData();
                formData.append('name', name);
                formData.append('description', description);
                formData.append('sort_order', sortOrder);
                
                const response = await fetch('http://localhost:8000/api/modules', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('模块添加成功');
                    document.getElementById('addModuleForm').reset();
                    loadModules();
                } else {
                    alert('添加失败：' + result.error);
                }
            } catch (error) {
                alert('添加失败：' + error.message);
            }
        }
        
        // 编辑模块
        function editModule(id, name, description, sortOrder, isActive) {
            document.getElementById('editModuleId').value = id;
            document.getElementById('editName').value = name;
            document.getElementById('editDesc').value = description;
            document.getElementById('editSort').value = sortOrder;
            document.getElementById('editStatus').value = isActive;
            
            const modal = new bootstrap.Modal(document.getElementById('editModal'));
            modal.show();
        }
        
        // 保存编辑
        async function saveEditedModule() {
            const id = document.getElementById('editModuleId').value;
            const name = document.getElementById('editName').value.trim();
            const description = document.getElementById('editDesc').value.trim();
            const sortOrder = document.getElementById('editSort').value;
            const isActive = document.getElementById('editStatus').value;
            
            if (!name) {
                alert('请输入模块名称');
                return;
            }
            
            try {
                const formData = new FormData();
                formData.append('name', name);
                formData.append('description', description);
                formData.append('sort_order', sortOrder);
                formData.append('is_active', isActive);
                
                const response = await fetch(`http://localhost:8000/api/modules/${id}`, {
                    method: 'PUT',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                    loadModules();
                    alert('保存成功');
                } else {
                    alert('保存失败：' + result.error);
                }
            } catch (error) {
                alert('保存失败：' + error.message);
            }
        }
        
        // 删除模块
        async function deleteModule(id) {
            if (!confirm('确定要删除这个功能模块吗？\n注意：如果该模块下已有用例，删除后这些用例将无法正常显示模块名称。')) {
                return;
            }
            
            try {
                const response = await fetch(`http://localhost:8000/api/modules/${id}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    loadModules();
                    alert('删除成功');
                } else {
                    alert('删除失败：' + result.error);
                }
            } catch (error) {
                alert('删除失败：' + error.message);
            }
        }
    </script>
</body>
</html>
